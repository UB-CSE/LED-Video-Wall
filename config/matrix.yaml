# Matrix specifications define the types of LED matrices available
matrix-specs:
  ws2812b-8x32:
    power_limit_amps: 10.0
    width-height: [32, 8]
  ws2812b-16x16:
    power_limit_amps: 5.0
    width-height: [16, 16]
# Physical matrix placements in the display
matrices:
  matrix1:
    spec: ws2812b-8x32
    pos: [0, 0]
    rot: "up"
  matrix2:
    spec: ws2812b-8x32
    pos: [0, 8]
    rot: "up"
  matrix3:
    spec: ws2812b-16x16
    pos: [32, 0]
    rot: "up"
# Client (microcontroller) configurations
clients:
  "AA-BB-CC-11-22-33":
    matrix-connections:
      - pin: 12
        matrices: ["matrix1"]
  "FF-FE-FA-44-55-66":
    matrix-connections:
      - pin: 13
        matrices: ["matrix3"]
